<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Alunos</title>
</head>

<body>
    <h1>Lista de Alunos</h1>
    <a th:href="@{/alunos/criar}">Adicionar Novo Aluno</a>

    <table border="1">
        <thead>
            <tr>
                <td>Nome:</td>
                <td>Email:</td>
                <td>Telefone:</td>
                <td>CPF:</td>
                <td>Cidade:</td>
                <td>Endereço:</td>
                <td>Curso:</td>
            </tr>
        </thead>

        <tbody>
            <tr th:each="aluno : ${alunos}">
                <td th:text="${aluno.nomeAluno}"></td>
                <td th:text="${aluno.emailAluno}"></td>
                <td th:text="${aluno.telefoneAluno}"></td>
                <td th:text="${aluno.cpfAluno}"></td>
                <td th:text="${aluno.cidadeAluno}"></td>
                <td th:text="${aluno.enderecoAluno}"></td>
                <td th:text="${aluno.curso.nomeCurso}"></td>
                <td>
                    <a th:href="@{/alunos/editar/{id}(id=${aluno.idAluno})}">Editar</a>
                    <a th:href="@{/alunos/excluir/{id}(id=${aluno.idAluno})}">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
