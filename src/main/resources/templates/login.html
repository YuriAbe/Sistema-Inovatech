<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema Inovatech</title>
</head>

<body>
    <h1 style="text-align: center;">Acesso ao Sistema Inovatech</h1>

    <form th:action="@{/login}" method="post">
        
        <label>Usuário:</label>
        <input type="text" name="username">
        <br>
        <label>Senha</label>
        <input type="password" name="password">
        <br>

        <button type="submit">Entrar</button>
        
    </form>

    <p th:if="${param.error}">Login inválido</p>
    <p th:if="${param.logout}">Logout efetuado</p>
</body>

</html>
